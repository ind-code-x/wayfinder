<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wayfinder Promo Video Export</title>
  <style>
    :root {
      --green: #138808;
      --orange: #ff671f;
      --navy: #071124;
      --muted: #64748b;
      --cream: #fffaf2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: var(--navy);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(1120px, calc(100vw - 32px));
      display: grid;
      gap: 16px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.18);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 14px;
      background: white;
      padding: 14px 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--orange);
      color: white;
      font-weight: 800;
      padding: 12px 18px;
      cursor: pointer;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="promo" width="1920" height="1080"></canvas>
    <div class="controls">
      <p id="status">Click export to create wayfinder-promo.webm.</p>
      <button id="export">Export 20s Promo Video</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('promo');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');
    const exportButton = document.getElementById('export');
    const W = canvas.width;
    const H = canvas.height;
    const DURATION = 20;

    const scenes = [
      { start: 0, end: 4.5, title: 'wayfinder', subtitle: 'Compare flights, trains, buses and drives across India', tag: 'Travel smarter' },
      { start: 4.5, end: 9, title: 'Search one route', subtitle: 'See travel time, distance, fare estimates and map routes together', tag: 'Hyderabad to Pune' },
      { start: 9, end: 13.5, title: 'Compare live fares', subtitle: 'Open trusted booking sites directly and confirm the latest price', tag: 'Flights • Bus • Train • Cab' },
      { start: 13.5, end: 17, title: 'Explore India daily', subtitle: 'Temples, cities, hill stations, beaches and travel ideas in one place', tag: 'India travel discovery' },
      { start: 17, end: 20, title: 'wayfinderinfo.com', subtitle: 'Plan your next trip with Wayfinder', tag: 'Made by AdiAru Soft Solutions Pvt Ltd' },
    ];

    function ease(x) {
      return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawText(text, x, y, size, color, weight = 800, align = 'left') {
      ctx.font = `${weight} ${size}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.fillStyle = color;
      ctx.textAlign = align;
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(text, x, y);
    }

    function drawWrapped(text, x, y, maxWidth, lineHeight, size, color) {
      ctx.font = `500 ${size}px Inter, Segoe UI, Arial, sans-serif`;
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      const words = text.split(' ');
      let line = '';
      let lineY = y;
      for (const word of words) {
        const next = line ? `${line} ${word}` : word;
        if (ctx.measureText(next).width > maxWidth && line) {
          ctx.fillText(line, x, lineY);
          line = word;
          lineY += lineHeight;
        } else {
          line = next;
        }
      }
      ctx.fillText(line, x, lineY);
    }

    function drawBackground(t) {
      const gradient = ctx.createLinearGradient(0, 0, W, H);
      gradient.addColorStop(0, '#fff7ed');
      gradient.addColorStop(0.48, '#ffffff');
      gradient.addColorStop(1, '#ecfdf5');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(255, 103, 31, 0.10)';
      ctx.beginPath();
      ctx.arc(280 + Math.sin(t) * 30, 170, 260, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(19, 136, 8, 0.10)';
      ctx.beginPath();
      ctx.arc(1630 + Math.cos(t * 0.8) * 40, 870, 310, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(15, 23, 42, 0.06)';
      ctx.lineWidth = 2;
      for (let x = 0; x < W; x += 90) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 90) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
    }

    function drawLogo() {
      ctx.save();
      ctx.translate(112, 105);
      ctx.strokeStyle = '#138808';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(0, 0, 30, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#ff671f';
      ctx.beginPath();
      ctx.moveTo(12, -16);
      ctx.lineTo(-5, 10);
      ctx.lineTo(17, 5);
      ctx.closePath();
      ctx.fill();
      drawText('way', 48, 12, 38, '#138808', 900);
      drawText('finder', 124, 12, 38, '#ff671f', 900);
      ctx.restore();
    }

    function drawRouteVisual(progress) {
      const cardX = 1060;
      const cardY = 180;
      roundedRect(cardX, cardY, 680, 620, 36);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.82)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(15, 23, 42, 0.08)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(14, 165, 233, 0.16)';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cardX + 90, cardY + 450);
      ctx.bezierCurveTo(cardX + 230, cardY + 350, cardX + 310, cardY + 520, cardX + 470, cardY + 390);
      ctx.bezierCurveTo(cardX + 570, cardY + 310, cardX + 500, cardY + 220, cardX + 610, cardY + 170);
      ctx.stroke();

      const p = Math.min(1, progress);
      const start = { x: cardX + 115, y: cardY + 455 };
      const end = { x: cardX + 605, y: cardY + 172 };
      const x = lerp(start.x, end.x, ease(p));
      const y = lerp(start.y, end.y, ease(p));

      ctx.strokeStyle = '#138808';
      ctx.lineWidth = 7;
      ctx.setLineDash([18, 18]);
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.setLineDash([]);

      for (const point of [start, end]) {
        ctx.fillStyle = point === start ? '#ff671f' : '#138808';
        ctx.beginPath();
        ctx.arc(point.x, point.y, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 6;
        ctx.stroke();
      }

      ctx.fillStyle = '#0f172a';
      drawText('Route options', cardX + 62, cardY + 90, 32, '#0f172a', 900);
      const rows = [
        ['Flight', '2h 19m', 'from Rs 2,800', '#0284c7'],
        ['Train', '4h 52m', 'from Rs 1,007', '#059669'],
        ['Bus', '8h 38m', 'from Rs 787', '#d97706'],
      ];
      rows.forEach((row, index) => {
        const yRow = cardY + 125 + index * 92;
        roundedRect(cardX + 52, yRow, 570, 68, 18);
        ctx.fillStyle = 'rgba(248, 250, 252, 0.94)';
        ctx.fill();
        ctx.fillStyle = row[3];
        ctx.beginPath();
        ctx.arc(cardX + 88, yRow + 34, 14, 0, Math.PI * 2);
        ctx.fill();
        drawText(row[0], cardX + 120, yRow + 42, 24, '#0f172a', 800);
        drawText(row[1], cardX + 315, yRow + 42, 22, '#475569', 700);
        drawText(row[2], cardX + 455, yRow + 42, 22, '#138808', 800);
      });
    }

    function drawSearchBar(localT) {
      const x = 250;
      const y = 675;
      const w = 780;
      const h = 92;
      roundedRect(x, y, w, h, 28);
      ctx.fillStyle = 'white';
      ctx.fill();
      ctx.shadowColor = 'rgba(15, 23, 42, 0.12)';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = 'rgba(15, 23, 42, 0.08)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;

      drawText('Hyderabad, India', x + 52, y + 58, 26, '#0f172a', 700);
      drawText('Pune, India', x + 405, y + 58, 26, '#0f172a', 700);
      ctx.strokeStyle = '#e2e8f0';
      ctx.beginPath();
      ctx.moveTo(x + 340, y + 18);
      ctx.lineTo(x + 340, y + h - 18);
      ctx.stroke();

      roundedRect(x + w - 180, y + 18, 150, 56, 18);
      ctx.fillStyle = localT > 0.5 ? '#138808' : '#ff671f';
      ctx.fill();
      drawText('Search', x + w - 105, y + 55, 22, 'white', 800, 'center');
    }

    function drawFrame(time) {
      const scene = scenes.find(item => time >= item.start && time <= item.end) || scenes[scenes.length - 1];
      const local = Math.min(1, Math.max(0, (time - scene.start) / (scene.end - scene.start)));
      const intro = ease(Math.min(1, local * 2));
      drawBackground(time);
      drawLogo();

      roundedRect(110, 172, 255, 46, 23);
      ctx.fillStyle = 'rgba(19, 136, 8, 0.10)';
      ctx.fill();
      drawText(scene.tag, 238, 203, 22, '#138808', 800, 'center');

      ctx.save();
      ctx.globalAlpha = intro;
      ctx.translate(0, (1 - intro) * 36);
      drawText(scene.title, 112, 360, scene.title.length > 16 ? 64 : 86, '#071124', 950);
      drawWrapped(scene.subtitle, 116, 440, 780, 42, 34, '#475569');
      drawSearchBar(local);
      ctx.restore();

      drawRouteVisual((time % 7) / 7);

      ctx.fillStyle = '#ff671f';
      ctx.fillRect(0, H - 24, W * (time / DURATION), 24);
      ctx.fillStyle = '#138808';
      ctx.fillRect(0, H - 12, W * (time / DURATION), 12);
    }

    let previewStart = performance.now();
    function preview() {
      const time = ((performance.now() - previewStart) / 1000) % DURATION;
      drawFrame(time);
      requestAnimationFrame(preview);
    }
    preview();

    async function exportVideo() {
      exportButton.disabled = true;
      exportButton.textContent = 'Exporting...';
      statusText.textContent = 'Recording 20 seconds. Keep this tab open.';

      const stream = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream, {
        mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
          ? 'video/webm;codecs=vp9'
          : 'video/webm',
      });
      const chunks = [];
      recorder.ondataavailable = event => {
        if (event.data.size > 0) chunks.push(event.data);
      };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'wayfinder-promo.webm';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        exportButton.disabled = false;
        exportButton.textContent = 'Export 20s Promo Video';
        statusText.textContent = 'Export complete. Your browser downloaded wayfinder-promo.webm.';
      };

      recorder.start();
      const exportStart = performance.now();
      function renderExport() {
        const elapsed = (performance.now() - exportStart) / 1000;
        drawFrame(Math.min(elapsed, DURATION));
        if (elapsed < DURATION) requestAnimationFrame(renderExport);
        else recorder.stop();
      }
      renderExport();
    }

    exportButton.addEventListener('click', exportVideo);
  </script>
</body>
</html>
